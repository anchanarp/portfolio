<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Portfolio website hero preview">
  <defs>
    <linearGradient id="bgp" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#030611"/>
      <stop offset=".56" stop-color="#060b1a"/>
      <stop offset="1" stop-color="#0c1025"/>
    </linearGradient>
    <linearGradient id="rp" x1="0" x2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset=".48" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glowp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bgp)"/>
  <circle cx="880" cy="210" r="260" fill="#7c3aed" opacity=".2"/>
